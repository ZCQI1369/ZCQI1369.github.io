<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阶段3：函数封装练习</title>
</head>
<body>
    <h3>知识点：函数声明、形参实参、return返回、匿名函数</h3>
    <script>
        // 1.普通函数：计算两数之和
        function add(num1, num2) {
            return num1 + num2;
        }
        let res = add(5, 7);
        console.log("相加结果：", res);

        // 2.带判断的函数：判断数字奇偶
        function isOdd(n) {
            if(n % 2 === 0) return "偶数";
            return "奇数";
        }
        console.log(isOdd(9));

        // 3.匿名函数赋值
        let minus = function(a, b) {
            return a - b;
        }
        console.log(minus(20, 6));
    </script>
</body>
</html>
