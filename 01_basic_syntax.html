<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阶段1：JS基础语法练习</title>
</head>
<body>
    <h3>知识点：变量、数据类型、if判断、for循环、算术运算符</h3>
    <script>
        // 1.变量与基础数据类型
        let name = "JS初学者";
        const grade = 1;
        let score = 88.5;
        let isPass = true;
        console.log("姓名：", name, "年级：", grade, "分数：", score, "是否及格：", isPass);

        // 2.分支判断 if else
        if (score >= 60) {
            console.log("考试及格");
        } else {
            console.log("考试不及格");
        }

        // 3.for循环 打印1-10
        console.log("循环输出1~10：");
        for(let i = 1; i <= 10; i++){
            console.log(i);
        }

        // 4.简单运算
        let a = 10, b = 3;
        console.log("加法：", a + b);
        console.log("取余：", a % b);
    </script>
</body>
</html>
