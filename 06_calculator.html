<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阶段6：简易计算器</title>
    <style>
        #calc {
            width: 240px;
            border: 2px solid #333;
            padding: 10px;
        }
        input {
            width: 100%;
            margin-bottom: 10px;
            height: 30px;
            font-size: 18px;
        }
        button {
            width: 50px;
            height: 40px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div id="calc">
        <input type="text" id="inputNum" readonly>
        <br>
        <button>1</button><button>2</button><button>3</button><button>+</button>
        <br>
        <button>4</button><button>5</button><button>6</button><button>-</button>
        <br>
        <button>7</button><button>8</button><button>9</button><button>=</button>
        <br>
        <button>0</button><button>C</button>
    </div>
    <h3>知识点：DOM事件委托、运算逻辑、字符串拼接、判断计算</h3>
    <script>
        let input = document.getElementById("inputNum");
        let btns = document.querySelectorAll("button");

        btns.forEach(item => {
            item.addEventListener("click", function(){
                let text = this.innerText;
                if(text === "C"){
                    input.value = "";
                }else if(text === "="){
                    try{
                        input.value = eval(input.value);
                    }catch{
                        input.value = "输入错误";
                    }
                }else{
                    input.value += text;
                }
            })
        })
    </script>
</body>
</html>
